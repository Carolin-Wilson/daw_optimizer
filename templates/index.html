<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAW Optimizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #2d2d2d; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 400px; }
        h1 { text-align: center; color: #00d2ff; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input[type="number"] { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background-color: #333; color: white; margin-top: 5px;}
        .hidden { display: none; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 20px;}
        button { width: 100%; padding: 15px; background-color: #00d2ff; color: #000; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px;}
        button:hover { background-color: #00a8cc; }
        #status { text-align: center; margin-top: 15px; color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h1>DAW Optimizer</h1>
    
    <div class="form-group">
        <label>1. Target Tracks</label>
        <select id="target" onchange="toggleStemOptions()">
            <option value="all">All Tracks</option>
            <option value="selected">Selected Tracks</option>
            <option value="stems">Stems</option>
        </select>
    </div>

    <div id="stem-options" class="hidden">
        <div class="form-group">
            <label>Number of Stems</label>
            <input type="number" id="num-stems" min="1" max="10" value="4">
        </div>
        <div class="form-group">
            <label>Basis of Stems</label>
            <select id="basis">
                <option value="instrument">Instrument Based</option>
                <option value="frequency">Frequency Based</option>
            </select>
        </div>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="rename" checked>
        <label for="rename" style="margin:0;">Rename tracks with instrument name</label>
    </div>

    <button onclick="runOptimizer()">Optimize Session</button>
    <div id="status"></div>
</div>

<script>
    // Logic to show/hide Stem inputs
    function toggleStemOptions() {
        const target = document.getElementById('target').value;
        const stemOptions = document.getElementById('stem-options');
        if (target === 'stems') {
            stemOptions.classList.remove('hidden');
        } else {
            stemOptions.classList.add('hidden');
        }
    }

    // Logic to send data to Python
    async function runOptimizer() {
        document.getElementById('status').innerText = "Processing...";
        
        const payload = {
            target: document.getElementById('target').value,
            numStems: document.getElementById('num-stems').value,
            basis: document.getElementById('basis').value,
            rename: document.getElementById('rename').checked
        };

        const response = await fetch('/optimize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        document.getElementById('status').innerText = result.message;
    }
</script>

</body>
</html>
